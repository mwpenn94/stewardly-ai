<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stewardly AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; }
    .header { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .tabs { display: flex; border-bottom: 1px solid #222; }
    .tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; }
    .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .content { padding: 16px; }
    .chat-input { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none; resize: none; }
    .chat-input:focus { border-color: #60a5fa; }
    .btn { padding: 8px 16px; background: #60a5fa; color: #000; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; }
    .btn:hover { background: #3b82f6; }
    .search-input { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 12px; outline: none; margin-bottom: 12px; }
    .placeholder { text-align: center; padding: 40px 16px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    <h1>Stewardly AI</h1>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="chat">Chat</div>
    <div class="tab" data-tab="calculator">Calculator</div>
    <div class="tab" data-tab="clients">Clients</div>
  </div>

  <div class="content" id="content">
    <textarea class="chat-input" rows="3" placeholder="Ask Stewardly anything..."></textarea>
    <div style="margin-top: 8px; display: flex; justify-content: flex-end;">
      <button class="btn" id="sendBtn">Send</button>
    </div>
    <div id="response" class="placeholder" style="margin-top: 16px;">
      Responses will appear here. Connect to stewardly.manus.space to get started.
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        const content = document.getElementById('content');
        if (tabName === 'chat') {
          content.innerHTML = '<textarea class="chat-input" rows="3" placeholder="Ask Stewardly anything..."></textarea><div style="margin-top:8px;display:flex;justify-content:flex-end;"><button class="btn" id="sendBtn">Send</button></div><div id="response" class="placeholder" style="margin-top:16px;">Responses will appear here.</div>';
        } else if (tabName === 'calculator') {
          content.innerHTML = '<div class="placeholder">Mini calculators coming soon.<br>Use the full calculator at stewardly.manus.space</div>';
        } else if (tabName === 'clients') {
          content.innerHTML = '<input class="search-input" placeholder="Search clients..."><div class="placeholder">Client search requires authentication.<br>Sign in at stewardly.manus.space first.</div>';
        }
      });
    });

    // Send message
    document.addEventListener('click', (e) => {
      if (e.target.id === 'sendBtn') {
        const textarea = document.querySelector('.chat-input');
        const text = textarea?.value?.trim();
        if (!text) return;
        const responseEl = document.getElementById('response');
        responseEl.textContent = 'Thinking...';
        chrome.runtime.sendMessage({
          type: 'API_CALL',
          endpoint: 'chat.send',
          method: 'POST',
          body: { content: text },
        }, (res) => {
          responseEl.textContent = res?.success ? (res.data?.content || 'Response received') : `Error: ${res?.error || 'Unknown'}`;
        });
      }
    });
  </script>
</body>
</html>
